org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# OneDrive's Files On-Demand cloud reparse points make Gradle's filesystem
# watcher throw "not a regular file" on otherwise-normal, fully-synced files.
# Disabling VFS watching avoids the snapshot attribute read that trips on it.
org.gradle.vfs.watch=false
